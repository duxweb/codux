<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Codux</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Segoe UI", ui-sans-serif, sans-serif;
        background: transparent;
      }

      html,
      body,
      #root {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
      }

      body {
        background: transparent;
        color: rgb(231 236 243);
        -webkit-font-smoothing: antialiased;
      }

      #codux-startup-shell {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        background:
          linear-gradient(180deg, rgb(28 34 44 / 0.86), rgb(18 22 30 / 0.9)),
          rgb(18 22 30 / 0.92);
        box-shadow: inset 0 0 0 1px rgb(255 255 255 / 0.08);
        -webkit-app-region: drag;
        app-region: drag;
      }

      html.codux-standalone-route #codux-startup-shell {
        display: none;
      }

      .codux-startup-stack {
        display: flex;
        min-width: 220px;
        flex-direction: column;
        align-items: center;
      }

      .codux-startup-icon {
        width: 96px;
        height: 96px;
      }

      .codux-startup-title {
        margin-top: 20px;
        font-size: 15px;
        font-weight: 650;
        line-height: 1;
      }

      .codux-startup-track {
        width: 132px;
        height: 4px;
        margin-top: 14px;
        overflow: hidden;
        border-radius: 999px;
        background: rgb(255 255 255 / 0.08);
      }

      .codux-startup-bar {
        width: 50%;
        height: 100%;
        border-radius: inherit;
        background: rgb(59 130 246 / 0.86);
        animation: codux-startup-progress 1.15s ease-in-out infinite;
      }

      @keyframes codux-startup-progress {
        0% {
          transform: translateX(-105%);
        }
        52% {
          transform: translateX(65%);
        }
        100% {
          transform: translateX(210%);
        }
      }
    </style>
  </head>
  <body>
    <script>
      (() => {
        const route = window.location.hash.replace(/^#/, "");
        const routePath = route.split("?")[0] || route;
        const isStandalone =
          routePath === "/about" ||
          routePath === "/settings" ||
          routePath === "/project-create" ||
          routePath === "/pet-claim" ||
          routePath === "/pet-dex" ||
          routePath === "/pet-custom-install" ||
          routePath === "/memory-manager" ||
          route.startsWith("/terminal") ||
          route.startsWith("/git-diff");
        if (isStandalone) {
          document.documentElement.classList.add("codux-standalone-route");
        }
      })();
    </script>
    <div id="root">
      <main id="codux-startup-shell" aria-label="Codux is starting" data-tauri-drag-region>
        <div class="codux-startup-stack" data-tauri-drag-region>
          <svg
            class="codux-startup-icon"
            viewBox="0 0 128 128"
            aria-hidden="true"
            focusable="false"
            xmlns="http://www.w3.org/2000/svg"
          >
            <defs>
              <linearGradient id="codux-startup-bg" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0" stop-color="rgb(61 128 250)" />
                <stop offset="1" stop-color="rgb(41 92 219)" />
              </linearGradient>
              <radialGradient id="codux-startup-top" cx="50%" cy="18%" r="50%">
                <stop offset="0" stop-color="white" stop-opacity="0.1" />
                <stop offset="1" stop-color="white" stop-opacity="0" />
              </radialGradient>
              <radialGradient id="codux-startup-bottom" cx="50%" cy="92%" r="45%">
                <stop offset="0" stop-color="black" stop-opacity="0.08" />
                <stop offset="1" stop-color="black" stop-opacity="0" />
              </radialGradient>
              <clipPath id="codux-startup-clip">
                <rect x="10.24" y="10.24" width="107.52" height="107.52" rx="28.16" ry="28.16" />
              </clipPath>
              <filter id="codux-startup-shadow" x="-20%" y="-20%" width="140%" height="140%">
                <feDropShadow dx="0" dy="1.28" stdDeviation="1.28" flood-color="black" flood-opacity="0.2" />
              </filter>
            </defs>
            <g clip-path="url(#codux-startup-clip)">
              <rect x="10.24" y="10.24" width="107.52" height="107.52" fill="url(#codux-startup-bg)" />
              <rect x="10.24" y="10.24" width="107.52" height="107.52" fill="url(#codux-startup-top)" />
              <rect x="10.24" y="10.24" width="107.52" height="107.52" fill="url(#codux-startup-bottom)" />
              <path
                d="M40.32 44.8 L62.08 64 L40.32 83.2"
                fill="none"
                stroke="white"
                stroke-opacity="0.4"
                stroke-width="11.52"
                stroke-linecap="square"
                stroke-linejoin="miter"
              />
              <path
                d="M65.92 44.8 L87.68 64 L65.92 83.2"
                fill="none"
                stroke="white"
                stroke-width="11.52"
                stroke-linecap="square"
                stroke-linejoin="miter"
                filter="url(#codux-startup-shadow)"
              />
              <rect
                x="10.74"
                y="10.74"
                width="106.52"
                height="106.52"
                rx="27.66"
                ry="27.66"
                fill="none"
                stroke="white"
                stroke-opacity="0.08"
                stroke-width="1"
              />
            </g>
          </svg>
          <div class="codux-startup-title" data-tauri-drag-region>正在启动 Codux</div>
          <div class="codux-startup-track" data-tauri-drag-region><div class="codux-startup-bar"></div></div>
        </div>
      </main>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
