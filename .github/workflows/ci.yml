name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make scripts executable
        run: chmod +x dev.sh build.sh scripts/dev/restart-dev-gui.sh scripts/release/package-local-dmg.sh

      - name: Validate shell scripts
        run: zsh -n dev.sh build.sh scripts/dev/restart-dev-gui.sh scripts/release/package-local-dmg.sh

      - name: Build debug
        run: swift build -c debug

      - name: Build release
        run: swift build -c release
