name: Release Tauri

on:
  push:
    tags:
      - "tauri-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Source tag or branch to build, for example tauri-v0.1.0. Defaults to tauri."
        required: false
        default: tauri
        type: string

permissions:
  contents: write

jobs:
  publish-tauri:
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}
    env:
      SOURCE_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
      RELEASE_TAG: tauri-stable

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.23.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and publish Tauri bundles
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: Codux Tauri Stable
          releaseBody: Cross-platform Codux Tauri release built from `${{ env.SOURCE_REF }}`. This release stays marked as prerelease so the native macOS Sparkle channel can continue using GitHub's latest release. The `latest.json` asset is used by the in-app Tauri updater.
          releaseCommitish: ${{ env.SOURCE_REF }}
          releaseDraft: false
          prerelease: true
          projectPath: .
          tauriScript: pnpm tauri
          args: ${{ matrix.args }}
          uploadUpdaterJson: true
          uploadUpdaterSignatures: true
          releaseAssetNamePattern: codux-tauri-[version]-[platform]-[arch].[ext]
