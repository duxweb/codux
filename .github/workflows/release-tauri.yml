name: Release Desktop

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Source tag to build, for example v1.0.0-beta.1."
        required: false
        default: v1.0.0-beta.1
        type: string
      channel:
        description: "Updater channel to publish."
        required: false
        default: auto
        type: choice
        options:
          - auto
          - beta
          - stable

permissions:
  contents: write

jobs:
  publish-desktop:
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}
    env:
      SOURCE_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.23.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          requested_channel="${{ github.event_name == 'workflow_dispatch' && inputs.channel || 'auto' }}"
          node scripts/release/prepare-release.mjs "${SOURCE_REF}" "${requested_channel}"

      - name: Verify release version
        shell: bash
        run: |
          node -e "const version = '${{ steps.meta.outputs.version }}'; if (!/^\\d+\\.\\d+\\.\\d+(?:-[0-9A-Za-z.-]+)?(?:\\+[0-9A-Za-z.-]+)?$/.test(version)) { throw new Error('Invalid SemVer: ' + version); }"

      - name: Build and publish desktop bundles
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: tauri-${{ steps.meta.outputs.channel }}
          releaseName: Codux ${{ steps.meta.outputs.version }}
          releaseBody: ${{ steps.meta.outputs.notes }}
          releaseCommitish: ${{ env.SOURCE_REF }}
          releaseDraft: false
          prerelease: ${{ steps.meta.outputs.channel == 'beta' }}
          projectPath: .
          tauriScript: pnpm tauri
          args: ${{ matrix.args }}
          uploadUpdaterJson: true
          updaterJsonPreferNsis: true
          uploadUpdaterSignatures: true
          releaseAssetNamePattern: codux-[version]-[platform]-[arch].[ext]
